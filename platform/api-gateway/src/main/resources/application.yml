server:
  port: 9080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:9888
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:4200
            allowedMethods:
              - GET
              - POST
              - PATCH
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**,/api/auth/**
        - id: leave-service
          uri: lb://leave-service
          predicates:
            - Path=/api/leaves/**
        - id: sickness-service
          uri: lb://sickness-service
          predicates:
            - Path=/api/sickness/**
        - id: telework-service
          uri: lb://telework-service
          predicates:
            - Path=/api/telework/**
        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/api/reports/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/subscriptions/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
