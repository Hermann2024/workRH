server:
  port: 9888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: >
            file:infra/config-repo,
            file:../infra/config-repo,
            file:../../infra/config-repo

management:
  endpoints:
    web:
      exposure:
        include: health,info
