version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "12181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "19092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:19092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres-users:
    image: postgres:16
    environment:
      POSTGRES_DB: workrh_users
      POSTGRES_USER: workrh
      POSTGRES_PASSWORD: workrh
    ports:
      - "6432:5432"

  postgres-leaves:
    image: postgres:16
    environment:
      POSTGRES_DB: workrh_leaves
      POSTGRES_USER: workrh
      POSTGRES_PASSWORD: workrh
    ports:
      - "6433:5432"

  postgres-sickness:
    image: postgres:16
    environment:
      POSTGRES_DB: workrh_sickness
      POSTGRES_USER: workrh
      POSTGRES_PASSWORD: workrh
    ports:
      - "6434:5432"

  postgres-telework:
    image: postgres:16
    environment:
      POSTGRES_DB: workrh_telework
      POSTGRES_USER: workrh
      POSTGRES_PASSWORD: workrh
    ports:
      - "6435:5432"

  postgres-notifications:
    image: postgres:16
    environment:
      POSTGRES_DB: workrh_notifications
      POSTGRES_USER: workrh
      POSTGRES_PASSWORD: workrh
    ports:
      - "6436:5432"

  postgres-reporting:
    image: postgres:16
    environment:
      POSTGRES_DB: workrh_reporting
      POSTGRES_USER: workrh
      POSTGRES_PASSWORD: workrh
    ports:
      - "6437:5432"

  postgres-subscriptions:
    image: postgres:16
    environment:
      POSTGRES_DB: workrh_subscriptions
      POSTGRES_USER: workrh
      POSTGRES_PASSWORD: workrh
    ports:
      - "6438:5432"

  discovery-service:
    build:
      context: ../..
      dockerfile: platform/discovery-service/Dockerfile
    ports:
      - "9761:9761"

  config-server:
    build:
      context: ../..
      dockerfile: platform/config-server/Dockerfile
    ports:
      - "9888:9888"
    environment:
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config-repo
    volumes:
      - ../config-repo:/config-repo
    depends_on:
      - discovery-service

  api-gateway:
    build:
      context: ../..
      dockerfile: platform/api-gateway/Dockerfile
    ports:
      - "9080:9080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:9761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9888
    depends_on:
      - discovery-service
      - config-server
      - user-service
      - leave-service
      - sickness-service
      - telework-service
      - reporting-service
      - notification-service
      - subscription-service

  user-service:
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-users:5432/workrh_users
      SPRING_DATASOURCE_USERNAME: workrh
      SPRING_DATASOURCE_PASSWORD: workrh
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:9761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9888
      SUBSCRIPTION_SERVICE_BASE_URL: http://subscription-service:9087
    depends_on:
      - postgres-users
      - kafka
      - subscription-service

  leave-service:
    build:
      context: ../..
      dockerfile: services/leave-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-leaves:5432/workrh_leaves
      SPRING_DATASOURCE_USERNAME: workrh
      SPRING_DATASOURCE_PASSWORD: workrh
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:9761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9888
      SUBSCRIPTION_SERVICE_BASE_URL: http://subscription-service:9087
    depends_on:
      - postgres-leaves
      - kafka
      - subscription-service

  sickness-service:
    build:
      context: ../..
      dockerfile: services/sickness-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-sickness:5432/workrh_sickness
      SPRING_DATASOURCE_USERNAME: workrh
      SPRING_DATASOURCE_PASSWORD: workrh
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:9761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9888
      SUBSCRIPTION_SERVICE_BASE_URL: http://subscription-service:9087
    depends_on:
      - postgres-sickness
      - kafka
      - subscription-service

  telework-service:
    build:
      context: ../..
      dockerfile: services/telework-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-telework:5432/workrh_telework
      SPRING_DATASOURCE_USERNAME: workrh
      SPRING_DATASOURCE_PASSWORD: workrh
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:9761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9888
      SUBSCRIPTION_SERVICE_BASE_URL: http://subscription-service:9087
    depends_on:
      - postgres-telework
      - kafka
      - subscription-service

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notifications:5432/workrh_notifications
      SPRING_DATASOURCE_USERNAME: workrh
      SPRING_DATASOURCE_PASSWORD: workrh
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:9761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9888
      SUBSCRIPTION_SERVICE_BASE_URL: http://subscription-service:9087
    depends_on:
      - postgres-notifications
      - kafka
      - subscription-service

  reporting-service:
    build:
      context: ../..
      dockerfile: services/reporting-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-reporting:5432/workrh_reporting
      SPRING_DATASOURCE_USERNAME: workrh
      SPRING_DATASOURCE_PASSWORD: workrh
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:9761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9888
      SUBSCRIPTION_SERVICE_BASE_URL: http://subscription-service:9087
    depends_on:
      - postgres-reporting
      - kafka
      - subscription-service

  subscription-service:
    build:
      context: ../..
      dockerfile: services/subscription-service/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-subscriptions:5432/workrh_subscriptions
      SPRING_DATASOURCE_USERNAME: workrh
      SPRING_DATASOURCE_PASSWORD: workrh
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:9761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:9888
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_PREMIUM: ${STRIPE_PRICE_PREMIUM:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      STRIPE_PRICE_SMS_OPTION: ${STRIPE_PRICE_SMS_OPTION:-}
      STRIPE_PRICE_ADVANCED_AUDIT_OPTION: ${STRIPE_PRICE_ADVANCED_AUDIT_OPTION:-}
      STRIPE_PRICE_ADVANCED_EXPORT_OPTION: ${STRIPE_PRICE_ADVANCED_EXPORT_OPTION:-}
    depends_on:
      - postgres-subscriptions
      - kafka
