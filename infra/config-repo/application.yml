spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest

security:
  jwt:
    secret: c29tZS1yZWFsbHktbG9uZy1iYXNlNjQtc2VjcmV0LWZvci13b3JrcmgtZGVtby1vbmx5
    expiration: 86400

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info

subscription:
  service:
    base-url: http://localhost:8087

stripe:
  base-url: https://api.stripe.com
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:}
  prices:
    starter: ${STRIPE_PRICE_STARTER:}
    pro: ${STRIPE_PRICE_PRO:}
    premium: ${STRIPE_PRICE_PREMIUM:}
    enterprise: ${STRIPE_PRICE_ENTERPRISE:}
    sms-option: ${STRIPE_PRICE_SMS_OPTION:}
    advanced-audit-option: ${STRIPE_PRICE_ADVANCED_AUDIT_OPTION:}
    advanced-export-option: ${STRIPE_PRICE_ADVANCED_EXPORT_OPTION:}
